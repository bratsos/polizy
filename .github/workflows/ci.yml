name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm biome check .

      - name: Type check
        run: pnpm tsc --noEmit
        working-directory: packages/polizy

      - name: Type check (tests + bench)
        run: pnpm tsc --noEmit -p tsconfig.tests.json
        working-directory: packages/polizy

      - name: Test
        run: pnpm test
        working-directory: packages/polizy
        env:
          NODE_ENV: test
          # The Prisma adapter suite runs against a real database. SQLite file DB,
          # created on the fly by `prisma db push`; the client is generated by the
          # package's `pretest` hook.
          DATABASE_URL: "file:./dev.db"

      - name: Build
        run: pnpm build
        working-directory: packages/polizy
